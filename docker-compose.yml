version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: centraldesk_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: centraldesk_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: centraldesk_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: centraldesk
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: centraldesk
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: centraldesk_redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: centraldesk_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data: